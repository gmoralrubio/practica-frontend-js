<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <link
    rel="icon"
    type="image/x-icon"
    href="/public/assets/favicon.ico"
  >
  <link
    href="https://api.fontshare.com/v2/css?f[]=satoshi@1&display=swap"
    rel="stylesheet"
  >
  <link
    rel="stylesheet"
    href="../dist/styles.css"
  >
  <title>Wallaclon</title>
</head>

<body class="bg-taupe-50 min-h-screen">
  <div class="max-w-7xl mx-auto px-4">

    <header class="navbar bg-base-100 shadow-sm">
      <div class="navbar-start">
        <a
          href="index.html"
          class="font-bold text-3xl"
        >Wallaclon</a>
      </div>

      <div class="navbar-end session-container space-x-3"></div>
    </header>

    <section class="notification-container"></section>
    <section class="loader-container"></section>
    <dialog class="modal">
      <div class="modal-box w-md modal-inner-container">
        <form method="dialog">
          <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
        </form>
        <div class="modal-loader-container"></div>
        <div class="modal-notification-container"></div>
      </div>
      <form
        method="dialog"
        class="modal-backdrop"
      >
        <button>close</button>
      </form>
    </dialog>
    <section class="new-product-action-container"></section>
    <div class="content ">
      <aside class="filters-container">
        <p class="text-sm font-medium">Filtros</p>
        <div class="divider my-1"></div>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Productos por página</legend>
          <select
            class="select"
            name="limit"
            id="limit"
          >
            <option
              disabled
              selected
            >Selecciona</option>
            <option value="5">5</option>
            <option value="10">10</option>
            <option value="15">15</option>
          </select>
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Orden</legend>
          <select
            class="select"
            name="sort"
            id="sort"
          >
            <option
              disabled
              selected
            >Selecciona</option>
            <option value="name_asc">Nombre ascendente</option>
            <option value="name_desc">Nombre descendente</option>
            <option value="price_asc">Precio ascendente</option>
            <option value="price_desc">Precio descendente</option>
          </select>
        </fieldset>
        <fieldset class="fieldset">
          <legend class="fieldset-legend">Buscar producto</legend>
          <label class="input">
            <svg
              class="h-[1em] opacity-50"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 24 24"
            >
              <g
                stroke-linejoin="round"
                stroke-linecap="round"
                stroke-width="2.5"
                fill="none"
                stroke="currentColor"
              >
                <circle
                  cx="11"
                  cy="11"
                  r="8"
                ></circle>
                <path d="m21 21-4.3-4.3"></path>
              </g>
            </svg>
            <input
              type="search"
              name="search"
              id="search"
              placeholder="Buscar"
            />
          </label>
        </fieldset>
      </aside>
      <main class="products-container">
        <div class="no-products-container"></div>
        <div class="products-wrapper"></div>
      </main>
    </div>
  </div>

  <script
    type="module"
    src="../src/pages/index.js"
  ></script>
</body>

</html>
